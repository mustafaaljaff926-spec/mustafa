databases:
  - name: my-dashboard-db
    databaseName: my_dashboard
    user: my_dashboard_user

services:
  - type: web
    name: my-dashboard
    env: node
    plan: free
    root: .
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: DATABASE_URL
        fromDatabase:
          name: my-dashboard-db
          property: connectionString
